<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Dashboard — NEXOVERSE</title>
  <link rel="stylesheet" href="css/global.css" />
  <link rel="stylesheet" href="css/dashboard.css" />
</head>
<body>

<div class="aurora-bg">
  <div class="aurora-blob"></div>
  <div class="aurora-blob"></div>
  <div class="aurora-blob"></div>
</div>

<div id="page-loader">
  <div class="loader-logo">NEXOVERSE</div>
  <div class="loader-spinner"></div>
  <div class="loader-bar"><div class="loader-bar-fill"></div></div>
</div>

<div class="app-layout">
  <!-- Sidebar + Overlay injected here -->
  <div id="sidebar-container"></div>

  <div class="main-content">
    <!-- Navbar injected here -->
    <div id="navbar-container"></div>

    <div class="page-content">

      <!-- Welcome Banner -->
      <div id="welcome-banner" class="welcome-banner"></div>

      <!-- Quick Actions -->
      <div class="section-header">
        <div class="section-title">⚡ Quick Actions</div>
      </div>
      <div id="quick-actions" class="quick-actions mb-6"></div>

      <!-- Stats Grid -->
      <div class="section-header">
        <div class="section-title">📊 Overview</div>
        <a href="pages/analytics.html" class="btn btn-ghost btn-sm">Full Analytics →</a>
      </div>
      <div id="stats-grid" class="grid-4 mb-6"></div>

      <!-- Main Content Area (two columns) -->
      <div style="display:grid;grid-template-columns:1fr 340px;gap:24px;align-items:start" id="main-grid">

        <!-- Left: Role-specific content -->
        <div id="role-content"></div>

        <!-- Right: Activity + Upcoming -->
        <div>
          <!-- Recent Activity -->
          <div class="card mb-4">
            <div class="section-header" style="margin-bottom:0">
              <div class="section-title">🕐 Recent Activity</div>
            </div>
            <div id="recent-activity"></div>
          </div>

          <!-- Upcoming Events -->
          <div class="card">
            <div class="section-header">
              <div class="section-title">🔥 Trending Events</div>
              <a href="pages/events.html" class="btn btn-ghost btn-sm">See All</a>
            </div>
            <div id="upcoming-events" class="grid-auto"></div>
          </div>
        </div>

      </div>

    </div>
  </div>
</div>

<div id="toast-container"></div>

<script src="js/ui.js"></script>
<script src="js/auth.js"></script>
<script src="js/data.js"></script>
<script src="components/sidebar.js"></script>
<script src="js/dashboard.js"></script>
<script>
document.addEventListener('DOMContentLoaded', () => {
  if (!requireAuth()) return;
  initDashboardLayout({ activePage: 'dashboard', pageTitle: 'Dashboard', basePath: '' });

  // Responsive main grid
  const mainGrid = document.getElementById('main-grid');
  function adjustGrid() {
    if (mainGrid) {
      mainGrid.style.gridTemplateColumns = window.innerWidth < 1024 ? '1fr' : '1fr 340px';
    }
  }
  adjustGrid();
  window.addEventListener('resize', adjustGrid);
});
</script>
</body>
</html>
