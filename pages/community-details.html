<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Community Details — NEXOVERSE</title>
  <link rel="stylesheet" href="../css/global.css" />
  <link rel="stylesheet" href="../css/dashboard.css" />
  <link rel="stylesheet" href="../css/community.css" />
</head>
<body>

<div class="aurora-bg">
  <div class="aurora-blob"></div>
  <div class="aurora-blob"></div>
  <div class="aurora-blob"></div>
</div>
<div id="page-loader">
  <div class="loader-logo"><img class="loader-logo-image" src="../assets/logos/logo-placeholder.svg" alt="NEXOVERSE logo placeholder" /><div class="loader-logo-copy"><div class="loader-logo-name">NEXOVERSE</div><div class="loader-logo-subtitle">The Member Ecosystem Platform</div></div></div>
  <div class="loader-spinner"></div>
  <div class="loader-bar"><div class="loader-bar-fill"></div></div>
</div>

<div class="app-layout">
  <div id="sidebar-container"></div>

  <div class="main-content">
    <div id="navbar-container"></div>

    <div class="page-content">
      <!-- Header -->
      <div class="section-header mb-6">
        <div>
          <h1 style="font-size:24px;font-weight:800">Community Details</h1>
          <div class="text-secondary text-sm mt-1">Explore members, events, and community info</div>
        </div>
        <a href="communities.html" class="btn btn-ghost btn-sm">← Back to Communities</a>
      </div>

      <!-- Detail content injected by JS -->
      <div id="community-detail-content">
        <!-- Skeleton -->
        <div class="skeleton" style="height:220px;border-radius:20px 20px 0 0"></div>
        <div style="padding:0 32px;margin-top:-40px;margin-bottom:28px;display:flex;align-items:flex-end;gap:20px">
          <div class="skeleton" style="width:80px;height:80px;border-radius:20px;flex-shrink:0"></div>
          <div style="flex:1;display:flex;flex-direction:column;gap:8px;padding-bottom:4px">
            <div class="skeleton" style="height:28px;width:50%"></div>
            <div class="skeleton" style="height:14px;width:70%"></div>
          </div>
        </div>
        <div style="display:grid;grid-template-columns:1fr 300px;gap:24px">
          <div>
            <div class="skeleton" style="height:200px;border-radius:16px;margin-bottom:16px"></div>
            <div class="skeleton" style="height:180px;border-radius:16px"></div>
          </div>
          <div>
            <div class="skeleton" style="height:300px;border-radius:16px"></div>
          </div>
        </div>
      </div>
    </div>
  </div>
</div>

<div id="toast-container"></div>
<div id="report-modal" role="dialog" aria-modal="true" aria-labelledby="report-modal-title" style="display:none;position:fixed;inset:0;align-items:center;justify-content:center;background:rgba(8,11,20,.72);backdrop-filter:blur(10px);z-index:2000;padding:20px">
  <div class="modal-card">
    <div class="section-title" id="report-modal-title">Report content</div>
    <div class="text-secondary text-sm mt-1">Tell us why you're reporting this item — our moderation team will review.</div>
    <div class="input-group mt-4">
      <label class="input-label">Details</label>
      <textarea id="report-modal-reason" class="input-field" rows="5" placeholder="Describe the issue or reason for reporting..."></textarea>
    </div>
    <div style="display:flex;gap:10px;justify-content:flex-end;flex-wrap:wrap;margin-top:16px">
      <button class="btn btn-ghost btn-sm" onclick="closeReportModal()">Cancel</button>
      <button class="btn btn-primary btn-sm" onclick="submitReportModal()">Submit Report</button>
    </div>
  </div>
</div>

<script src="../js/ui.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-firestore-compat.js"></script>
<script src="../js/firebase.js"></script>
<script src="../js/auth.js"></script>
<script src="../js/data.js"></script>
<script src="../components/sidebar.js"></script>
<script src="../js/communities.js"></script>
<script>
document.addEventListener('DOMContentLoaded', () => {
  if (!requireAuth()) return;
  initDashboardLayout({
    activePage: 'communities',
    pageTitle:  'Community Details',
    basePath:   '../'
  });
});
</script>
</body>
</html>
