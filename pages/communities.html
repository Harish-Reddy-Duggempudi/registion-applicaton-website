<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Communities — NEXOVERSE</title>
  <link rel="stylesheet" href="../css/global.css" />
  <link rel="stylesheet" href="../css/dashboard.css" />
  <link rel="stylesheet" href="../css/community.css" />
</head>
<body>

<div class="aurora-bg"><div class="aurora-blob"></div><div class="aurora-blob"></div><div class="aurora-blob"></div></div>
<div id="page-loader"><div class="loader-logo"><img class="loader-logo-image" src="../assets/logos/logo-placeholder.svg" alt="NEXOVERSE logo placeholder" /><div class="loader-logo-copy"><div class="loader-logo-name">NEXOVERSE</div><div class="loader-logo-subtitle">The Student Ecosystem Platform</div></div></div><div class="loader-spinner"></div><div class="loader-bar"><div class="loader-bar-fill"></div></div></div>

<div class="app-layout">
  <div id="sidebar-container"></div>
  <div class="main-content">
    <div id="navbar-container"></div>
    <div class="page-content">

      <!-- Header -->
      <div class="section-header mb-4">
        <div>
          <h1 style="font-size:24px;font-weight:800">Communities</h1>
          <div class="text-secondary text-sm mt-1">Discover and join student tech communities</div>
        </div>
        <div style="display:flex;gap:10px">
          <a href="create-community.html" class="btn btn-primary">+ Create Community</a>
        </div>
      </div>

      <!-- Tabs -->
      <div style="display:flex;gap:8px;margin-bottom:20px;border-bottom:1px solid var(--border);padding-bottom:0">
        <button class="tab-btn active" data-tab-target="explore" style="padding:10px 20px;border-radius:0;border-bottom:2px solid transparent;background:none;color:var(--text-secondary);font-size:14px;font-weight:500;cursor:pointer;transition:all 0.2s" id="explore-tab">🌐 Explore All</button>
        <button class="tab-btn" data-tab-target="mine"    style="padding:10px 20px;border-radius:0;border-bottom:2px solid transparent;background:none;color:var(--text-secondary);font-size:14px;font-weight:500;cursor:pointer;transition:all 0.2s" id="mine-tab">⭐ My Communities</button>
      </div>

      <div data-tab-panel="explore">
        <!-- Search & Filter -->
        <div style="display:flex;gap:12px;margin-bottom:16px;flex-wrap:wrap">
          <div class="search-bar" style="flex:1;min-width:200px;max-width:400px">
            <span class="search-icon">🔍</span>
            <input type="text" id="community-search" placeholder="Search communities..." />
          </div>
        </div>

        <div class="filter-chips communities-filter">
          <button class="filter-chip active" data-filter="all">All</button>
          <button class="filter-chip" data-filter="Google">Google</button>
          <button class="filter-chip" data-filter="Microsoft">Microsoft</button>
          <button class="filter-chip" data-filter="ACM">ACM</button>
          <button class="filter-chip" data-filter="IEEE">IEEE</button>
          <button class="filter-chip" data-filter="Design">Design</button>
          <button class="filter-chip" data-filter="Entrepreneurship">Startup</button>
        </div>

        <div id="communities-grid" class="grid-auto mt-4"></div>
      </div>

      <div data-tab-panel="mine" style="display:none">
        <div id="my-communities-grid" class="grid-auto"></div>
      </div>

    </div>
  </div>
</div>

<div id="toast-container"></div>
<script src="../js/ui.js"></script>
<script src="../js/auth.js"></script>
<script src="../js/data.js"></script>
<script src="../components/sidebar.js"></script>
<script src="../js/communities.js"></script>
<script>
document.addEventListener('DOMContentLoaded', () => {
  if (!requireAuth()) return;
  initDashboardLayout({ activePage:'communities', pageTitle:'Communities', basePath:'../' });

  // My communities
  const myGrid = document.getElementById('my-communities-grid');
  if (myGrid) {
    createSkeletonCards(myGrid, 3, 240);
    setTimeout(() => {
      const joined = DataStore.getCommunities().slice(0,4);
      if (joined.length === 0) {
        myGrid.innerHTML = `<div class="empty-state" style="grid-column:1/-1"><div class="empty-icon">🌐</div><div class="empty-title">No communities yet</div><div class="empty-desc">Explore and join your first community!</div><button class="btn btn-primary mt-3" onclick="document.getElementById('explore-tab').click()">Explore Communities</button></div>`;
      } else {
        myGrid.innerHTML = joined.map(c => `
          <div class="community-card" onclick="window.location='community-details.html?id=${c.id}'">
            <div class="community-card-banner" style="background:${c.banner};height:90px">
              <div class="community-card-logo">${c.emoji}</div>
            </div>
            <div class="community-card-body">
              <div class="community-card-name">${c.name}</div>
              <div class="community-card-desc">${c.desc}</div>
              <div class="community-card-meta">
                <span class="badge badge-green">✅ Joined</span>
                <span class="community-card-members">👥 ${c.members.toLocaleString()}</span>
              </div>
            </div>
          </div>`).join('');
      }
    }, 700);
  }

  // Tab switching
  document.querySelectorAll('[data-tab-target]').forEach(tab => {
    tab.addEventListener('click', () => {
      document.querySelectorAll('[data-tab-target]').forEach(t => {
        t.style.borderBottom = '2px solid transparent';
        t.style.color = 'var(--text-secondary)';
      });
      document.querySelectorAll('[data-tab-panel]').forEach(p => p.style.display = 'none');
      tab.style.borderBottom = '2px solid var(--purple-500)';
      tab.style.color = 'var(--purple-400)';
      const panel = document.querySelector(`[data-tab-panel="${tab.dataset.tabTarget}"]`);
      if (panel) panel.style.display = '';
    });
  });

  // Init first tab styling
  document.getElementById('explore-tab').style.borderBottom = '2px solid var(--purple-500)';
  document.getElementById('explore-tab').style.color = 'var(--purple-400)';
});
</script>
</body>
</html>
