<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Communities — NEXOVERSE</title>
  <link rel="stylesheet" href="../css/global.css" />
  <link rel="stylesheet" href="../css/dashboard.css" />
  <link rel="stylesheet" href="../css/community.css" />
</head>
<body>

<div class="aurora-bg"><div class="aurora-blob"></div><div class="aurora-blob"></div><div class="aurora-blob"></div></div>
<div id="page-loader"><div class="loader-logo"><img class="loader-logo-image" src="../assets/logos/logo-placeholder.svg" alt="NEXOVERSE logo placeholder" /><div class="loader-logo-copy"><div class="loader-logo-name">NEXOVERSE</div><div class="loader-logo-subtitle">The Member Ecosystem Platform</div></div></div><div class="loader-spinner"></div><div class="loader-bar"><div class="loader-bar-fill"></div></div></div>

<div class="app-layout">
  <div id="sidebar-container"></div>
  <div class="main-content">
    <div id="navbar-container"></div>
    <div class="page-content">

      <!-- Header -->
      <div class="section-header mb-6">
        <div>
          <h1 style="font-size:24px;font-weight:800">Communities</h1>
          <div class="text-secondary text-sm mt-1">Discover and join thriving tech communities</div>
        </div>
        <div style="display:flex;gap:10px">
          <!-- Future Role Rules:
               member
               - Browse communities
               - Join communities
               - Cannot create communities

               organizer
               - Browse communities
               - Join communities
               - Create communities

               admin
               - Full access -->
          <a href="create-community.html" class="btn btn-primary">+ Create Community</a>
        </div>
      </div>

      <!-- Tabs -->
      <div style="display:flex;gap:8px;margin-bottom:20px;border-bottom:1px solid var(--border);padding-bottom:0">
        <button class="tab-btn" data-tab-target="trending" style="padding:10px 20px;border-radius:0;border-bottom:2px solid transparent;background:none;color:var(--text-secondary);font-size:14px;font-weight:500;cursor:pointer;transition:all 0.2s" id="trending-tab">🔥 Trending</button>
        <button class="tab-btn active" data-tab-target="explore" style="padding:10px 20px;border-radius:0;border-bottom:2px solid transparent;background:none;color:var(--text-secondary);font-size:14px;font-weight:500;cursor:pointer;transition:all 0.2s" id="explore-tab">🌐 Explore All</button>
        <button class="tab-btn" data-tab-target="mine"    style="padding:10px 20px;border-radius:0;border-bottom:2px solid transparent;background:none;color:var(--text-secondary);font-size:14px;font-weight:500;cursor:pointer;transition:all 0.2s" id="mine-tab">⭐ My Communities</button>
      </div>

      <div data-tab-panel="trending" style="display:none">
        <div class="card" style="margin-bottom:20px">
          <div class="section-title mb-2">🔥 Trending Communities</div>
          <div class="text-muted text-sm">Top communities ranked by live member count.</div>
        </div>
        <div id="trending-communities-grid" class="grid-auto mt-4"></div>
      </div>

      <div data-tab-panel="explore">
        <!-- Search & Filter -->
        <div style="display:flex;gap:12px;margin-bottom:16px;flex-wrap:wrap">
          <div class="search-bar" style="flex:1;min-width:200px;max-width:400px">
            <span class="search-icon">🔍</span>
            <input type="text" id="community-search" placeholder="Search communities..." />
          </div>
        </div>

        <div class="filter-chips communities-filter">
          <button class="filter-chip active" data-filter="all">All</button>
          <button class="filter-chip" data-filter="Google">Google</button>
          <button class="filter-chip" data-filter="Microsoft">Microsoft</button>
          <button class="filter-chip" data-filter="ACM">ACM</button>
          <button class="filter-chip" data-filter="IEEE">IEEE</button>
          <button class="filter-chip" data-filter="Design">Design</button>
          <button class="filter-chip" data-filter="Entrepreneurship">Startup</button>
        </div>

        <div id="communities-grid" class="grid-auto mt-4"></div>
      </div>

      <div data-tab-panel="mine" style="display:none">
        <div id="my-communities-grid" class="grid-auto"></div>
      </div>

      <!-- Future Firestore schema note for communities collection:
           {
             id: "",
             name: "",
             description: "",
             category: "",
             members: [],
             organizerId: "",
             createdAt: "",
             isApproved: true
           } -->

    </div>
  </div>
</div>

<div id="toast-container"></div>
<script src="../js/ui.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-firestore-compat.js"></script>
<script src="../js/firebase.js"></script>
<script src="../js/auth.js"></script>
<script src="../components/sidebar.js"></script>
<script src="../js/communities.js"></script>
<script>
document.addEventListener('DOMContentLoaded', () => {
  if (!requireAuth()) return;
  initDashboardLayout({ activePage:'communities', pageTitle:'Communities', basePath:'../' });

  // Future role check placeholder for Firestore-backed visibility.
  // if (user.role === "organizer" || user.role === "admin") {
  //   showCreateCommunityButton();
  // }
  const user = getCurrentUser();
  const canCreateCommunity = typeof canUseOrganizerFeatures === 'function' ? canUseOrganizerFeatures(user) : (user?.role === 'organizer' || user?.role === 'admin');
  const createCommunityAction = document.querySelector('a[href="create-community.html"]')?.closest('div[style*="gap:10px"]');
  if (createCommunityAction) {
    createCommunityAction.style.display = canCreateCommunity ? 'flex' : 'none';
  }

  const activeTabKey = 'nexoverse-communities-active-tab';
  const tabButtons = Array.from(document.querySelectorAll('[data-tab-target]'));
  const tabPanels = Array.from(document.querySelectorAll('[data-tab-panel]'));

  function setActiveTab(tabName, persist = true) {
    const selectedTab = tabButtons.find(tab => tab.dataset.tabTarget === tabName) || document.getElementById('explore-tab');
    if (!selectedTab) return;

    tabButtons.forEach(tab => {
      tab.classList.toggle('active', tab === selectedTab);
      tab.style.borderBottom = tab === selectedTab ? '2px solid var(--purple-500)' : '2px solid transparent';
      tab.style.color = tab === selectedTab ? 'var(--purple-400)' : 'var(--text-secondary)';
    });

    tabPanels.forEach(panel => {
      panel.style.display = panel.dataset.tabPanel === selectedTab.dataset.tabTarget ? '' : 'none';
    });

    if (selectedTab.dataset.tabTarget === 'trending' && typeof renderTrendingCommunities === 'function') {
      renderTrendingCommunities();
    }

    if (persist) {
      localStorage.setItem(activeTabKey, selectedTab.dataset.tabTarget);
    }
  }

  // Tab switching
  tabButtons.forEach(tab => {
    tab.addEventListener('click', () => {
      setActiveTab(tab.dataset.tabTarget);
    });
  });

  setActiveTab(localStorage.getItem(activeTabKey) || 'explore', false);
  if (typeof renderTrendingCommunities === 'function') {
    renderTrendingCommunities();
  }
});
</script>
</body>
</html>
