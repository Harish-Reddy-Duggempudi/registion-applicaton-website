<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Events — NEXOVERSE</title>
  <link rel="stylesheet" href="../css/global.css" />
  <link rel="stylesheet" href="../css/dashboard.css" />
  <link rel="stylesheet" href="../css/community.css" />
</head>
<body>

<div class="aurora-bg"><div class="aurora-blob"></div><div class="aurora-blob"></div><div class="aurora-blob"></div></div>
<div id="page-loader"><div class="loader-logo"><img class="loader-logo-image" src="../assets/logos/logo-placeholder.svg" alt="NEXOVERSE logo placeholder" /><div class="loader-logo-copy"><div class="loader-logo-name">NEXOVERSE</div><div class="loader-logo-subtitle">The Student Ecosystem Platform</div></div></div><div class="loader-spinner"></div><div class="loader-bar"><div class="loader-bar-fill"></div></div></div>

<div class="app-layout">
  <div id="sidebar-container"></div>
  <div class="main-content">
    <div id="navbar-container"></div>
    <div class="page-content">

      <div class="section-header mb-6">
        <div>
          <h1 style="font-size:24px;font-weight:800">Events</h1>
          <div class="text-secondary text-sm mt-1">Discover hackathons, workshops, talks & more</div>
        </div>
        <div style="display:flex;gap:10px" id="event-header-actions">
          <!-- Create button shown only for organizer/admin via JS -->
        </div>
      </div>

      <!-- Featured Banner -->
      <div style="background:linear-gradient(135deg,rgba(124,58,237,0.15),rgba(37,99,235,0.1));border:1px solid rgba(168,85,247,0.2);border-radius:20px;padding:24px 28px;margin-bottom:28px;display:flex;align-items:center;justify-content:space-between;gap:20px;flex-wrap:wrap">
        <div>
          <div class="text-muted text-xs mb-1">🔥 FEATURED EVENT</div>
          <div style="font-family:var(--font-display);font-size:20px;font-weight:800;margin-bottom:6px">HackHyderabad 3.0 — 36hr Hackathon</div>
          <div style="font-size:14px;color:var(--text-secondary)">📅 Sep 5, 2025 · T-Hub, Hyderabad · 👥 487/600 seats filled</div>
        </div>
        <a href="event-details.html?id=e2" class="btn btn-primary">View & Register →</a>
      </div>

      <!-- Search & Filter -->
      <div style="display:flex;gap:12px;margin-bottom:16px;flex-wrap:wrap">
        <div class="search-bar" style="flex:1;min-width:200px;max-width:420px">
          <span class="search-icon">🔍</span>
          <input type="text" id="event-search" placeholder="Search events, topics, tags..." />
        </div>
        <select class="input-field" style="width:auto;padding:10px 14px;border-radius:50px" onchange="sortEvents(this.value)">
          <option value="date">Sort: Date</option>
          <option value="popular">Sort: Popular</option>
          <option value="free">Sort: Free First</option>
        </select>
      </div>

      <div class="filter-chips events-filter">
        <button class="filter-chip active" data-filter="all">All Events</button>
        <button class="filter-chip" data-filter="Hackathon">🏆 Hackathons</button>
        <button class="filter-chip" data-filter="Workshop">🔧 Workshops</button>
        <button class="filter-chip" data-filter="Tech Talk">🎙️ Tech Talks</button>
        <button class="filter-chip" data-filter="Competition">⚡ Competitions</button>
        <button class="filter-chip" data-filter="Networking">🤝 Networking</button>
      </div>

      <div id="events-grid" class="grid-auto mt-4"></div>

    </div>
  </div>
</div>

<div id="toast-container"></div>
<script src="../js/ui.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-firestore-compat.js"></script>
<script src="../js/firebase.js"></script>
<script src="../js/auth.js"></script>
<script src="../js/data.js"></script>
<script src="../components/sidebar.js"></script>
<script src="../js/events.js"></script>
<script>
document.addEventListener('DOMContentLoaded', () => {
  if (!requireAuth()) return;
  initDashboardLayout({ activePage:'events', pageTitle:'Events', basePath:'../' });

  const user = getCurrentUser();
  if (user?.role === 'organizer' || user?.role === 'admin') {
    document.getElementById('event-header-actions').innerHTML =
      `<a href="create-event.html" class="btn btn-primary">+ Create Event</a>`;
  }
});

function sortEvents(val) {
  toast.info('Sorted', `Events sorted by: ${val}`);
}
</script>
</body>
</html>
