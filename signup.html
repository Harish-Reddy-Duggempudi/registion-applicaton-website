<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Sign Up — NEXOVERSE</title>
  <link rel="stylesheet" href="css/global.css" />
  <link rel="stylesheet" href="css/auth.css" />
</head>
<body class="auth-page">

<div class="aurora-bg">
  <div class="aurora-blob"></div>
  <div class="aurora-blob"></div>
  <div class="aurora-blob"></div>
</div>

<div class="auth-card">
  <div class="auth-logo">
    <img class="auth-logo-image" src="assets/logos/logo-placeholder.svg" alt="NEXOVERSE logo placeholder" />
    <div class="auth-logo-copy">
      <div class="auth-logo-name">NEXOVERSE</div>
      <div class="auth-logo-subtitle">The Student Ecosystem Platform</div>
    </div>
  </div>

  <div class="auth-heading">
    <h1>Join NEXOVERSE 🚀</h1>
    <p>Create your account and join the ecosystem in minutes</p>
  </div>

  <form class="auth-form" id="signup-form" novalidate>

    <!-- Google -->
    <button type="button" class="google-btn google-primary-btn" id="google-signup-btn">
      <span class="google-icon">🌐</span>
      <span class="btn-text">Continue with Google</span>
      <div class="btn-spinner"></div>
    </button>

    <div class="auth-divider">
      <div class="auth-divider-line"></div>
      <span class="auth-divider-text">OR CONTINUE WITH EMAIL</span>
      <div class="auth-divider-line"></div>
    </div>

    <div class="input-group">
      <label class="input-label" for="fullname">Full Name</label>
      <div class="input-with-icon">
        <span class="input-icon">👤</span>
        <input type="text" id="fullname" class="input-field" placeholder="Aarav Mehta" autocomplete="name" required />
      </div>
    </div>

    <div class="input-group">
      <label class="input-label" for="email">Email address</label>
      <div class="input-with-icon">
        <span class="input-icon">✉️</span>
        <input type="email" id="email" class="input-field" placeholder="you@company.com" autocomplete="email" required />
      </div>
    </div>

    <div class="input-group">
      <label class="input-label" for="password">Password</label>
      <div class="input-with-icon password-wrap">
        <span class="input-icon">🔒</span>
        <input type="password" id="password" class="input-field" placeholder="Min 8 characters" autocomplete="new-password" required />
        <span class="password-toggle" id="toggle-pw">👁️</span>
      </div>
      <!-- Password strength -->
      <div id="pw-strength-wrap" style="margin-top:6px;display:none">
        <div class="progress-bar">
          <div class="progress-fill" id="pw-strength-bar" style="width:0%;transition:width 0.3s ease,background 0.3s ease"></div>
        </div>
        <div id="pw-strength-label" style="font-size:11px;margin-top:4px;color:var(--text-muted)"></div>
      </div>
      <div style="font-size:11px;margin-top:4px;color:var(--text-muted)">Use at least 8 characters with one uppercase letter and one number.</div>
    </div>

    <div class="input-group">
      <label class="input-label" for="confirm-password">Confirm Password</label>
      <div class="input-with-icon password-wrap">
        <span class="input-icon">🔒</span>
        <input type="password" id="confirm-password" class="input-field" placeholder="Re-enter your password" autocomplete="new-password" required />
      </div>
    </div>

    <div style="display:flex;align-items:flex-start;gap:10px;font-size:13px;color:var(--text-secondary)">
      <input type="checkbox" id="terms" style="margin-top:2px;accent-color:var(--purple-500);width:16px;height:16px" required />
      <label for="terms">I agree to NEXOVERSE's <a href="#" class="auth-link" id="terms-link">Terms of Service</a> and <a href="#" class="auth-link" id="privacy-link">Privacy Policy</a></label>
    </div>

    <button type="submit" class="auth-submit" id="signup-btn">
      <span class="btn-text">Create Account 🚀</span>
      <div class="btn-spinner"></div>
    </button>

  </form>

  <div class="auth-footer">
    Already have an account?
    <a href="login.html" class="auth-link">Sign in</a>
  </div>

  <div style="text-align:center;margin-top:12px">
    <a href="index.html" style="font-size:12px;color:var(--text-muted)">← Back to home</a>
  </div>
</div>

<div id="toast-container"></div>

<!-- Policy Modal -->
<div id="policy-modal" class="policy-modal" aria-hidden="true">
  <div class="policy-modal-backdrop" data-close></div>
  <div class="policy-modal-dialog" role="dialog" aria-modal="true" aria-labelledby="policy-modal-title">
    <header class="policy-modal-header">
      <h3 id="policy-modal-title">Policy</h3>
      <button class="policy-modal-close" aria-label="Close" data-close>✕</button>
    </header>
    <div class="policy-modal-body">
      <iframe id="policy-iframe" src="" frameborder="0" style="width:100%;height:100%;border:0;border-radius:8px"></iframe>
    </div>
  </div>
</div>

<script src="js/ui.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-firestore-compat.js"></script>
<script src="js/firebase.js"></script>
<script src="js/auth.js"></script>
<script>
document.addEventListener('DOMContentLoaded', () => {
  redirectIfLoggedIn();

  // Password toggle
  const togglePw = document.getElementById('toggle-pw');
  const pwInput  = document.getElementById('password');
  const confirmPwInput = document.getElementById('confirm-password');
  if (togglePw && pwInput) {
    togglePw.addEventListener('click', () => {
      pwInput.type = pwInput.type === 'password' ? 'text' : 'password';
      togglePw.textContent = pwInput.type === 'password' ? '👁️' : '🙈';
    });

    // Password strength
    pwInput.addEventListener('input', () => {
      const val = pwInput.value;
      const wrap = document.getElementById('pw-strength-wrap');
      const bar  = document.getElementById('pw-strength-bar');
      const lbl  = document.getElementById('pw-strength-label');
        const signupBtn = document.getElementById('signup-btn');
        if (!val) { 
          wrap.style.display = 'none'; 
          if (signupBtn) signupBtn.style.display = 'none';
          return; 
        }
        // show/hide signup button based on strength
      wrap.style.display = '';
      let score = 0;
      if (val.length >= 8) score++;
      if (val.length >= 12) score++;
      if (/[A-Z]/.test(val)) score++;
      if (/[0-9]/.test(val)) score++;
      if (/[^A-Za-z0-9]/.test(val)) score++;
      const levels = [
        { pct:'20%', color:'#ef4444', label:'Weak' },
        { pct:'40%', color:'#f97316', label:'Fair' },
        { pct:'60%', color:'#facc15', label:'Good' },
        { pct:'80%', color:'#4ade80', label:'Strong' },
        { pct:'100%',color:'#22d3ee', label:'Very Strong 💪' },
      ];
      const lvl = levels[Math.min(score - 1, 4)] || levels[0];
      bar.style.width = lvl.pct;
      bar.style.background = lvl.color;
      lbl.textContent = lvl.label;
      lbl.style.color = lvl.color;
      // Require minimum rules for account creation: accept scores of 'Strong' or higher
      const isStrong = score >= 4;
      if (signupBtn) signupBtn.style.display = isStrong ? '' : 'none';
    });
  }

  // ensure signup button hidden initially until password qualifies
  const _signupBtnInit = document.getElementById('signup-btn');
  if (_signupBtnInit) _signupBtnInit.style.display = 'none';

  if (confirmPwInput && pwInput) {
    const clearMatchError = () => {
      confirmPwInput.classList.remove('error');
      const existing = confirmPwInput.parentElement.querySelector('.input-error');
      if (existing) existing.remove();
    };


  // Policy modal behavior
  (function(){
    const modal = document.getElementById('policy-modal');
    const iframe = document.getElementById('policy-iframe');
    const titleEl = document.getElementById('policy-modal-title');
    function openPolicy(url, title){
      if (!modal) return;
      titleEl.textContent = title || 'Policy';
      iframe.src = url;
      modal.setAttribute('aria-hidden','false');
    }
    function closePolicy(){
      if (!modal) return;
      modal.setAttribute('aria-hidden','true');
      // clear iframe after short delay to stop audio/video
      setTimeout(()=>{ iframe.src = ''; }, 300);
    }
    document.getElementById('terms-link')?.addEventListener('click', (e)=>{ e.preventDefault(); openPolicy('pages/terms-of-service.html','Terms of Service'); });
    document.getElementById('privacy-link')?.addEventListener('click', (e)=>{ e.preventDefault(); openPolicy('pages/privacy-policy.html','Privacy Policy'); });
    modal?.addEventListener('click', (e)=>{ if (e.target && e.target.matches('[data-close], .policy-modal-backdrop')) closePolicy(); });
    document.addEventListener('keydown', (e)=>{ if (e.key==='Escape') closePolicy(); });
  })();
    confirmPwInput.addEventListener('input', clearMatchError);
    pwInput.addEventListener('input', clearMatchError);
  }

  // Google signup
  document.getElementById('google-signup-btn').addEventListener('click', async () => {
    const btn = document.getElementById('google-signup-btn');
    btn.classList.add('loading');
    btn.disabled = true;
    try {
      await loginWithGoogle();
      toast.success('Signed in! 🎉', 'Redirecting to dashboard...');
      setTimeout(() => window.location.href = 'dashboard.html', 900);
    } catch (err) {
      btn.classList.remove('loading');
      btn.disabled = false;
      toast.error('Sign-up failed', err.message);
    }
  });

  // Email signup
  document.getElementById('signup-form').addEventListener('submit', async (e) => {
    e.preventDefault();
    const name     = document.getElementById('fullname').value.trim();
    const email    = document.getElementById('email').value.trim();
    const password = document.getElementById('password').value;
    const confirmPassword = document.getElementById('confirm-password').value;
    const terms    = document.getElementById('terms').checked;
    const btn      = document.getElementById('signup-btn');

    if (!name)     { showFieldError('fullname', 'Please enter your full name'); return; }
    if (!email)    { showFieldError('email', 'Please enter your email address'); return; }
    if (!password) { showFieldError('password', 'Please create a password'); return; }
    if (!confirmPassword) { showFieldError('confirm-password', 'Please confirm your password'); return; }
    if (password.length < 8) { showFieldError('password', 'Password must be at least 8 characters'); return; }
    if (!/[A-Z]/.test(password)) { showFieldError('password', 'Password must include at least 1 uppercase letter'); return; }
    if (!/[0-9]/.test(password)) { showFieldError('password', 'Password must include at least 1 number'); return; }
    if (password !== confirmPassword) { showFieldError('confirm-password', 'Passwords do not match'); return; }
    if (!terms) { toast.warning('Terms required', 'Please accept the terms to continue.'); return; }

    btn.classList.add('loading');
    btn.disabled = true;

    try {
      await registerUser(name, email, password);
      toast.success('Account created! 🎉', `Welcome to NEXOVERSE, ${name}!`);
      setTimeout(() => window.location.href = 'dashboard.html', 1000);
    } catch (err) {
      btn.classList.remove('loading');
      btn.disabled = false;
      toast.error('Sign-up failed', err.message || 'Something went wrong. Try again.');
    }
  });
});

function showFieldError(fieldId, message) {
  const field = document.getElementById(fieldId);
  if (!field) return;
  field.classList.add('error');
  const existing = field.parentElement.querySelector('.input-error');
  if (existing) existing.remove();
  const err = document.createElement('div');
  err.className = 'input-error';
  err.textContent = message;
  field.parentElement.appendChild(err);
  field.addEventListener('input', () => { field.classList.remove('error'); err.remove(); }, { once: true });
}
</script>
</body>
</html>
