<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Create Event — Nexora</title>
  <link rel="stylesheet" href="../css/global.css" />
  <link rel="stylesheet" href="../css/dashboard.css" />
  <link rel="stylesheet" href="../css/community.css" />
</head>
<body>
<div class="aurora-bg"><div class="aurora-blob"></div><div class="aurora-blob"></div><div class="aurora-blob"></div></div>
<div id="page-loader"><div class="loader-logo">Nexora</div><div class="loader-spinner"></div><div class="loader-bar"><div class="loader-bar-fill"></div></div></div>

<div class="app-layout">
  <div id="sidebar-container"></div>
  <div class="main-content">
    <div id="navbar-container"></div>
    <div class="page-content">

      <div style="margin-bottom:24px">
        <a href="events.html" class="btn btn-ghost btn-sm">← Back to Events</a>
      </div>

      <div style="max-width:760px">
        <h1 style="font-size:28px;font-weight:800;margin-bottom:6px">Create Event ✨</h1>
        <p class="text-secondary text-sm mb-6">Fill in the details below. Your event will go live after admin review.</p>

        <form id="create-event-form" novalidate>

          <!-- Basic Info -->
          <div class="form-section">
            <div class="form-section-title">📋 Basic Information</div>
            <div class="input-group mb-4">
              <label class="input-label">Event Title *</label>
              <input id="e-title" class="input-field" placeholder="e.g. HackHyderabad 4.0 — 48hr Innovation Sprint" required />
            </div>
            <div class="form-row mb-4">
              <div class="input-group">
                <label class="input-label">Category *</label>
                <select id="e-category" class="input-field" required>
                  <option value="">Select category</option>
                  <option value="Hackathon">🏆 Hackathon</option>
                  <option value="Workshop">🔧 Workshop</option>
                  <option value="Tech Talk">🎙️ Tech Talk</option>
                  <option value="Competition">⚡ Competition</option>
                  <option value="Networking">🤝 Networking</option>
                  <option value="Conference">🌐 Conference</option>
                </select>
              </div>
              <div class="input-group">
                <label class="input-label">Community</label>
                <select id="e-community" class="input-field">
                  <option value="">Independent Event</option>
                </select>
              </div>
            </div>
            <div class="input-group">
              <label class="input-label">Description *</label>
              <textarea id="e-description" class="input-field" rows="5" placeholder="Describe what attendees will experience, learn, and gain from this event..." required></textarea>
            </div>
          </div>

          <!-- Date & Time -->
          <div class="form-section">
            <div class="form-section-title">📅 Date & Time</div>
            <div class="form-row mb-4">
              <div class="input-group">
                <label class="input-label">Event Date *</label>
                <input id="e-date" type="date" class="input-field" required />
              </div>
              <div class="input-group">
                <label class="input-label">Start Time *</label>
                <input id="e-time" type="time" class="input-field" required />
              </div>
            </div>
            <div class="form-row">
              <div class="input-group">
                <label class="input-label">End Time</label>
                <input id="e-end-time" type="time" class="input-field" />
              </div>
              <div class="input-group">
                <label class="input-label">Registration Deadline</label>
                <input id="e-reg-deadline" type="date" class="input-field" />
              </div>
            </div>
          </div>

          <!-- Venue -->
          <div class="form-section">
            <div class="form-section-title">📍 Location</div>
            <div style="display:flex;align-items:center;gap:12px;margin-bottom:16px;padding:14px 16px;background:var(--bg-card);border:1px solid var(--border);border-radius:10px">
              <input type="checkbox" id="e-is-online" style="accent-color:var(--purple-500);width:18px;height:18px" />
              <label for="e-is-online" style="font-size:14px;cursor:pointer">🌐 This is an online event</label>
            </div>
            <div class="input-group mb-4" id="venue-group">
              <label class="input-label">Venue Name & Address *</label>
              <input id="e-venue" class="input-field" placeholder="e.g. T-Hub, Raidurg, Hyderabad, Telangana 500032" />
            </div>
            <div class="input-group" id="link-group" style="display:none">
              <label class="input-label">Event Link (Zoom/Meet/Teams)</label>
              <input id="e-link" class="input-field" placeholder="https://zoom.us/j/..." />
            </div>
          </div>

          <!-- Capacity & Pricing -->
          <div class="form-section">
            <div class="form-section-title">🎫 Capacity & Pricing</div>
            <div class="form-row mb-4">
              <div class="input-group">
                <label class="input-label">Max Attendees *</label>
                <input id="e-capacity" type="number" class="input-field" placeholder="e.g. 500" required min="1" />
              </div>
              <div class="input-group">
                <label class="input-label">Event Type</label>
                <div style="display:flex;align-items:center;gap:10px;margin-top:8px">
                  <input type="checkbox" id="e-is-free" checked style="accent-color:var(--purple-500);width:18px;height:18px" />
                  <label for="e-is-free" style="font-size:14px;cursor:pointer">🆓 Free Event</label>
                </div>
              </div>
            </div>
            <div class="input-group" id="price-group" style="display:none">
              <label class="input-label">Ticket Price (₹)</label>
              <input id="e-price" type="number" class="input-field" placeholder="e.g. 299" min="0" />
            </div>
          </div>

          <!-- Tags -->
          <div class="form-section">
            <div class="form-section-title">🏷️ Tags</div>
            <div class="input-group">
              <label class="input-label">Add Tags (comma separated)</label>
              <input id="e-tags" class="input-field" placeholder="e.g. AI/ML, Web3, FinTech, Flutter" />
            </div>
            <div style="display:flex;gap:8px;flex-wrap:wrap;margin-top:12px" id="quick-tags">
              <span class="badge badge-blue" style="cursor:pointer" onclick="addTag('Hackathon')">+ Hackathon</span>
              <span class="badge badge-purple" style="cursor:pointer" onclick="addTag('AI/ML')">+ AI/ML</span>
              <span class="badge badge-cyan" style="cursor:pointer" onclick="addTag('Web Dev')">+ Web Dev</span>
              <span class="badge badge-pink" style="cursor:pointer" onclick="addTag('Flutter')">+ Flutter</span>
              <span class="badge badge-green" style="cursor:pointer" onclick="addTag('Open Source')">+ Open Source</span>
              <span class="badge badge-yellow" style="cursor:pointer" onclick="addTag('Networking')">+ Networking</span>
            </div>
          </div>

          <!-- Submit -->
          <div style="display:flex;gap:12px;padding-top:8px">
            <button type="submit" class="btn btn-primary btn-lg" id="create-event-submit">
              <span class="btn-text">🚀 Create Event</span>
              <div class="btn-spinner"></div>
            </button>
            <a href="events.html" class="btn btn-ghost btn-lg">Cancel</a>
          </div>

        </form>
      </div>

    </div>
  </div>
</div>

<div id="toast-container"></div>
<script src="../js/ui.js"></script>
<script src="../js/auth.js"></script>
<script src="../js/data.js"></script>
<script src="../components/sidebar.js"></script>
<script src="../js/events.js"></script>
<script>
document.addEventListener('DOMContentLoaded', () => {
  if (!requireAuth()) return;
  initDashboardLayout({ activePage:'events', pageTitle:'Create Event', basePath:'../' });

  // Online toggle
  const onlineCheck = document.getElementById('e-is-online');
  onlineCheck?.addEventListener('change', () => {
    document.getElementById('venue-group').style.display = onlineCheck.checked ? 'none' : '';
    document.getElementById('link-group').style.display  = onlineCheck.checked ? '' : 'none';
  });

  // Free/paid toggle
  const freeCheck = document.getElementById('e-is-free');
  freeCheck?.addEventListener('change', () => {
    document.getElementById('price-group').style.display = freeCheck.checked ? 'none' : '';
  });

  // Set min date to today
  const dateInput = document.getElementById('e-date');
  if (dateInput) dateInput.min = new Date().toISOString().split('T')[0];
});

function addTag(tag) {
  const el = document.getElementById('e-tags');
  if (!el) return;
  const current = el.value.trim();
  el.value = current ? current + ', ' + tag : tag;
}
</script>
</body>
</html>
